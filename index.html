<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Seçim Simülasyonu</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-app:#f3f4f6;--bg-g1:#eef2ff;--bg-g2:#fff1f2;
  --ink:#111827;--ink-dim:#374151;--muted:#6b7280;--muted-lt:#9ca3af;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --card-bg:rgba(255,255,255,0.85);--card-border:rgba(255,255,255,0.6);
  --card-shadow:0 4px 6px -1px rgba(0,0,0,0.05),0 2px 4px -1px rgba(0,0,0,0.03);
  --line:#e5e7eb;--line-strong:#d1d5db;
  --blue:#2563eb;--blue-dark:#1e40af;--blue-soft:#dbeafe;
  --ok:#10b981;--warn:#f59e0b;
  --r-lg:16px;--r-md:12px;--r-sm:8px;
  --map-fill:#cbd5e1;--map-stroke:white;
}
[data-theme="dark"]{
  --bg-app:#111827;--bg-g1:rgba(30,64,175,0.15);--bg-g2:rgba(153,27,27,0.1);
  --ink:#f9fafb;--ink-dim:#d1d5db;--muted:#9ca3af;--muted-lt:#6b7280;
  --card-bg:rgba(31,41,55,0.85);--card-border:rgba(55,65,81,0.6);
  --card-shadow:0 4px 6px -1px rgba(0,0,0,0.2),0 2px 4px -1px rgba(0,0,0,0.15);
  --line:#374151;--line-strong:#4b5563;
  --map-fill:#334155;--map-stroke:rgba(255,255,255,0.15);
}
html,body{height:100vh;overflow:hidden;font-family:var(--sans);-webkit-font-smoothing:antialiased;color:var(--ink);background:var(--bg-app)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 10% 10%,var(--bg-g1),transparent 40%),radial-gradient(circle at 90% 20%,var(--bg-g2),transparent 40%);background-attachment:fixed;pointer-events:none;z-index:0}

/* ═══ SHELL ═══ */
.shell{position:relative;z-index:1;display:grid;grid-template-areas:"hdr hdr" "map res" "ctrl res";grid-template-rows:46px 1fr 174px;grid-template-columns:1fr 290px;height:100vh;overflow:hidden;gap:0 8px}
.hdr{grid-area:hdr;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue-dark),var(--blue),#a78bfa,#f472b6,transparent 80%);opacity:.5}
.mapzone{grid-area:map;position:relative;display:flex;flex-direction:column;overflow:hidden;margin:8px 0 0 8px;border-radius:var(--r-lg) var(--r-lg) 0 0;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-bottom:none;box-shadow:var(--card-shadow),inset 0 0 40px rgba(0,0,0,.015)}
.resultzone{grid-area:res;overflow:hidden;margin:8px 8px 8px 0;border-radius:var(--r-lg);background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);box-shadow:var(--card-shadow);display:flex;flex-direction:column}
.ctrlzone{grid-area:ctrl;overflow:hidden;margin:0 0 8px 8px;border-radius:0 0 var(--r-lg) var(--r-lg);background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-top:1px solid var(--line);box-shadow:var(--card-shadow);display:flex;flex-direction:column}

/* ═══ MAP ═══ */
.mbadge{position:absolute;top:12px;right:12px;background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:var(--r-sm);padding:6px 14px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;z-index:10}
.pinsp-name{font-size:15px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.pinsp-hint{font-size:11px;font-weight:600;color:var(--muted)}
.pinsp-data{display:flex;flex-wrap:wrap;gap:12px}
.pinsp-chip{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.pinsp-chip .pcd{width:7px;height:7px;border-radius:50%}
.pinsp-chip .pcn{color:var(--ink-dim)}
.pinsp-chip .pcv{font-family:var(--mono);font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.pinsp-chip .pcs{font-family:var(--mono);font-size:9px;font-weight:800;background:var(--blue);color:white;padding:1px 6px;border-radius:4px}

/* ═══ CONTROL BAR ═══ */
.ctrl-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.ctrl-body{flex:1;display:flex;gap:10px;padding:10px 12px;overflow:hidden;align-items:stretch}
.party-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:1fr 1fr;gap:5px 8px;flex:1;min-width:0}
.pcell{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--r-sm);background:rgba(0,0,0,.018);border:1px solid var(--line);transition:all .15s}
[data-theme="dark"] .pcell{background:rgba(255,255,255,.03)}
.pcell:hover{border-color:var(--line-strong);background:rgba(0,0,0,.03)}
.pcell:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);background:rgba(37,99,235,.02)}
.pdot{width:5px;height:22px;border-radius:3px;flex-shrink:0;box-shadow:0 0 6px rgba(0,0,0,.05)}
.pname{font-size:13px;font-weight:800;color:var(--ink);flex-shrink:0;min-width:32px;letter-spacing:-.01em}
.pinp{width:100%;min-width:0;padding:5px 2px;font-family:var(--mono);font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;background:transparent;border:none;color:var(--ink);outline:none}
.tgl{width:26px;height:15px;background:var(--line-strong);border-radius:8px;cursor:pointer;border:none;padding:0;position:relative;transition:background .2s;flex-shrink:0}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:white;border-radius:50%;transition:transform .2s cubic-bezier(.2,.8,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tgl.on{background:var(--blue)}.tgl.on::after{transform:translateX(11px)}
.ctrl-side{display:flex;flex-direction:column;gap:6px;justify-content:center;flex-shrink:0;width:160px}
.runbtn{padding:12px 18px;border-radius:var(--r-md);font-size:14px;font-weight:800;color:white;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border:none;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.22),inset 0 1px 0 rgba(255,255,255,.15);transition:all .2s;letter-spacing:.01em}
.runbtn:hover{box-shadow:0 8px 24px rgba(37,99,235,.35),inset 0 1px 0 rgba(255,255,255,.15);transform:translateY(-1px)}
.runbtn:active{transform:scale(.98);box-shadow:0 2px 8px rgba(37,99,235,.2)}

/* ═══ RESULTS ═══ */
.res-header{padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.res-body{flex:1;overflow-y:auto;padding:0}
.res-body::-webkit-scrollbar{width:3px}
.res-body::-webkit-scrollbar-track{background:transparent}
.res-body::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:2px}
.hbar{display:flex;height:12px;border-radius:6px;overflow:hidden;position:relative;background:rgba(0,0,0,.03)}
[data-theme="dark"] .hbar{background:rgba(255,255,255,.04)}
.hseg{transition:width .4s cubic-bezier(.2,.8,.2,1);min-width:0}
.majline{position:absolute;width:2px;top:-3px;bottom:-3px;background:var(--ink);opacity:.35;z-index:2;border-radius:1px}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700}
.pill-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.pill-name{color:var(--ink-dim)}
.pill-val{font-family:var(--mono);font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.rrow{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);position:relative;overflow:hidden;transition:background .15s}
.rrow:hover{background:rgba(0,0,0,.015)}
[data-theme="dark"] .rrow:hover{background:rgba(255,255,255,.02)}
.rrow:last-child{border-bottom:none}
.rbar{position:absolute;left:0;top:0;bottom:0;opacity:.06;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.rinfo{display:flex;align-items:center;gap:10px;z-index:1;position:relative}
.rdot{width:5px;height:24px;border-radius:3px;box-shadow:0 0 8px rgba(0,0,0,.06)}
.rname{font-size:14px;font-weight:800;color:var(--ink)}
.rpct{font-family:var(--mono);font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--muted)}
.rseats{font-family:var(--mono);font-weight:900;font-size:24px;font-variant-numeric:tabular-nums;color:var(--ink);z-index:1;position:relative;letter-spacing:-.03em}
.slbl{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

/* ═══ HEADER ═══ */
.logo{font-size:18px;font-weight:900;letter-spacing:-.03em;color:var(--ink)}
.logo span{color:var(--blue);background:linear-gradient(135deg,var(--blue),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mtabs{display:flex;background:rgba(0,0,0,.04);border-radius:10px;padding:3px;gap:2px}
[data-theme="dark"] .mtabs{background:rgba(255,255,255,.06)}
.mtab{padding:7px 18px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .25s cubic-bezier(.2,.8,.2,1);white-space:nowrap}
.mtab:hover{color:var(--ink-dim);background:rgba(0,0,0,.03)}
.mtab.active{background:white;color:var(--blue-dark);box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 0.5px rgba(0,0,0,.03)}
[data-theme="dark"] .mtab.active{background:rgba(255,255,255,.1);color:#93c5fd;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.abtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;color:var(--muted);background:rgba(0,0,0,.03);border:1px solid var(--line);cursor:pointer;transition:all .15s;white-space:nowrap}
[data-theme="dark"] .abtn{background:rgba(255,255,255,.05)}
.abtn:hover{background:rgba(0,0,0,.06);color:var(--ink-dim)}
.abtn:active{transform:scale(.97)}
.svbadge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.04);color:var(--muted-lt);letter-spacing:.03em}
.srch{width:180px;padding:7px 10px 7px 30px;font-size:12px;font-weight:600;background:rgba(0,0,0,.03);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--ink);outline:none;transition:all .2s;font-family:var(--sans)}
[data-theme="dark"] .srch{background:rgba(255,255,255,.05)}
.srch:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);width:220px}
.srchw{position:relative}.srchi{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted-lt);pointer-events:none}

/* ═══ TOOLTIP ═══ */
#tooltip{position:fixed;z-index:9999;pointer-events:none;background:rgba(255,255,255,.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:var(--r-lg);border:none;box-shadow:0 0 0 .5px rgba(0,0,0,.02),0 1px 3px rgba(0,0,0,.04),0 8px 24px -4px rgba(0,0,0,.12),0 24px 56px -12px rgba(0,0,0,.08);min-width:200px;overflow:hidden;transition:opacity .12s;color:var(--ink)}
[data-theme="dark"] #tooltip{background:rgba(17,24,39,.96);color:#f9fafb;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 8px 24px rgba(0,0,0,.4)}

/* ═══ MODALS ═══ */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:99990}
.mcard{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.18);width:100%;overflow:hidden}
.ptbl{width:100%;border-collapse:collapse;font-size:11px}
.ptbl th,.ptbl td{padding:5px 4px;text-align:center}
.ptbl thead th{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-lt);border-bottom:1px solid var(--line);background:var(--card-bg);position:sticky;top:0;z-index:2}
.ptbl input[type="number"]{width:40px;padding:4px 2px;font-family:var(--mono);font-size:11px;font-weight:600;text-align:center;background:rgba(0,0,0,.02);border:1px solid var(--line);border-radius:6px;color:var(--ink);outline:none;font-variant-numeric:tabular-nums}
.ptbl input[type="number"]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.08)}
.ptbl input[type="text"]{width:72px;padding:3px 4px;font-size:12px;font-weight:700;background:transparent;border:none;color:var(--ink);outline:none}

/* ═══ MISC ═══ */
/* Kill spinner arrows */
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield;appearance:textfield}
/* Multi-map layout: 1=full, 2=stack, 3=1top+2bottom */
.maps-row{flex:1;display:grid;min-height:0;overflow:hidden;gap:1px;padding:4px}
.maps-row[data-count="1"]{grid-template:1fr/1fr}
.maps-row[data-count="2"]{grid-template:1fr 1fr/1fr}
.maps-row[data-count="3"]{grid-template:1fr 1fr/1fr 1fr}
.maps-row[data-count="3"] .map-panel:first-child{grid-column:1/3}
.map-panel{display:flex;align-items:center;justify-content:center;min-height:0;min-width:0;position:relative;overflow:hidden;border-radius:var(--r-sm);background:rgba(0,0,0,.01)}
[data-theme="dark"] .map-panel{background:rgba(255,255,255,.01)}
.map-panel-label{position:absolute;top:6px;left:6px;background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:5px;padding:3px 8px;font-size:9px;font-weight:800;letter-spacing:.05em;color:var(--muted);z-index:10;text-transform:uppercase}
.map-panel svg{width:100%;height:100%;display:block;max-height:100%}
.map-panel path{fill:var(--map-fill);stroke:var(--map-stroke);stroke-width:.7;vector-effect:non-scaling-stroke;transition:fill .2s ease,filter .2s ease;cursor:pointer}
.map-panel path:hover{stroke:var(--ink);stroke-width:2;filter:drop-shadow(0 4px 12px rgba(0,0,0,.18))}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast{animation:toastIn .25s ease-out;backdrop-filter:blur(8px)}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
.map-panel path:focus-visible{outline:none;stroke:var(--blue);stroke-width:2.5;filter:drop-shadow(0 0 10px rgba(37,99,235,.3))}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="shell">
<!-- ═══ HEADER ═══ -->
<header class="hdr">
  <div class="logo">Seçim<span>Sim</span></div>
  <span class="svbadge" id="saveBadge">READY</span>
  <div class="mtabs" style="margin-left:8px">
    <button class="mtab btn-mode active" data-mode="parliamentary" onclick="toggleMode('parliamentary')">Parlamento</button>
    <button class="mtab btn-mode" data-mode="pres1" onclick="toggleMode('pres1')">CB 1. Tur</button>
    <button class="mtab btn-mode" data-mode="pres2" onclick="toggleMode('pres2')">CB 2. Tur</button>
  </div>
  <div style="flex:1"></div>
  <div class="srchw">
    <svg class="srchi" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="provinceSearch" type="search" placeholder="İl ara…" class="srch" autocomplete="off">
  </div>
  <button id="btnClearSearch" class="abtn" style="padding:5px 8px;margin-left:4px" aria-label="Temizle">✕</button>
  <div style="display:flex;align-items:center;gap:5px;margin-left:10px">
    <button id="btnAutoRun" class="abtn">Oto: <span style="font-family:var(--mono)">OFF</span></button>
    <button id="btnTheme" class="abtn"><span id="themeLabel">☀ AURORA</span></button>
    <button id="btnIO" class="abtn">I/O</button>
    <button id="btnReset" class="abtn">↺</button>
  </div>
</header>

  if(!provinces.length){alert("Province data missing.");return}

/* ── Mode toggle ── */
function toggleMode(mode){
  if(activeModes.has(mode)){
    if(activeModes.size<=1)return; // must keep at least 1
    activeModes.delete(mode);
  }else{activeModes.add(mode)}
  electionMode=[...activeModes][0]; // compat
  // Update tab buttons
  document.querySelectorAll('.btn-mode').forEach(b=>{b.classList.toggle('active',activeModes.has(b.dataset.mode))});
  rebuildMaps();
  updateMapColors();
}
function switchElectionMode(m){activeModes.clear();activeModes.add(m);electionMode=m;document.querySelectorAll('.btn-mode').forEach(b=>{b.classList.toggle('active',activeModes.has(b.dataset.mode))});rebuildMaps();updateMapColors()}

/* ── Map cloning ── */
function rebuildMaps(){
  const container=document.getElementById('mapsContainer');
  const template=document.querySelector('#svgTemplate svg');
  if(!container||!template)return;
  container.innerHTML='';
  const modes=[...activeModes];
  container.setAttribute('data-count',modes.length);
  modes.forEach((mode)=>{
    const panel=document.createElement('div');
    panel.className='map-panel';
    panel.dataset.mode=mode;
    panel.innerHTML=`<div class="map-panel-label">${MODE_LABELS[mode]||mode}</div>`;
    const svg=template.cloneNode(true);
    panel.appendChild(svg);
    container.appendChild(panel);
    svg.querySelectorAll('path').forEach(path=>{
      const prov=provinces.find(p=>p.id===path.getAttribute('id'));
      if(prov){
        path.addEventListener("mouseover",e=>handleMouseOver(e,prov,mode));
        path.addEventListener("mousemove",handleMouseMove);
        path.addEventListener("mouseout",handleMouseOut);
        path.addEventListener("click",()=>{if(typeof togglePin==='function')togglePin(prov)});
        path.addEventListener("mouseenter",()=>{if(typeof updatePI==='function')updatePI(prov)});
      }
    });
  });
}

/* ── 5×2 party grid ── */
function renderParliamentaryInputs(){
  let h='';
  parties.forEach(p=>{
    h+=`<div class="pcell">
      <div class="pdot" style="background:${partyColors[p]}"></div>
      <div class="pname">${p}</div>
      <input type="number" id="input_${p}" value="0" step="any" class="pinp" placeholder="0">
      <button type="button" class="tgl" id="qualify_${p}_btn" onclick="toggleQualify('${p}')" ${p==='OTH'?'disabled style="opacity:.25;cursor:default"':''} aria-label="${p} baraj"></button>
      <input type="checkbox" id="qualify_${p}" class="hidden" ${p==='OTH'?'disabled':''}>
    </div>`;
  });
  parliamentaryInputsDiv.innerHTML=h;
}
function toggleQualify(p){const cb=document.getElementById(`qualify_${p}`),btn=document.getElementById(`qualify_${p}_btn`);if(!cb||cb.disabled)return;cb.checked=!cb.checked;btn.classList.toggle('on',cb.checked)}

function renderPresidentialInputs(names=["Aday 1","Aday 2"]){
  let t=document.createElement('table');t.className="ptbl";t.id="presidentialTable";
  let th=t.createTHead(),hr=th.insertRow();
  hr.innerHTML=`<th style="text-align:left;padding-left:8px;font-size:10px">Aday</th>`+parties.map(p=>`<th style="color:${partyColors[p]}">${p}</th>`).join('');
  let tb=t.createTBody();names.forEach(n=>addCandidateRow(tb,n));
  let sr=tb.insertRow();sr.id="sandigaRow";
  sr.innerHTML=`<th style="text-align:left;font-size:9px;color:var(--muted-lt);padding-left:8px">Sandığa Gitmeyen %</th>`+parties.map(()=>`<td><input type="number" value="0" step="any"></td>`).join('');
  presidentialInputsDiv.innerHTML='';presidentialInputsDiv.appendChild(t);
}
function renderSecondRoundInputs(cands){

/* ── Map ── */
function updateMapColors(){
  const dfl=getComputedStyle(document.documentElement).getPropertyValue('--map-fill').trim()||'#cbd5e1';
  document.querySelectorAll('.map-panel').forEach(panel=>{
    const mode=panel.dataset.mode;
    const paths=panel.querySelectorAll('path');
    if(mode==="parliamentary"&&provinceResultsStore.length>0){
      provinceResultsStore.forEach(r=>{const w=Object.entries(r.localPercentages).reduce((a,b)=>a[1]>b[1]?a:b);
        const p=panel.querySelector(`[id="${r.province}"]`)||[...paths].find(x=>x.id===r.province);
        if(p){p.style.fill=adjustColor(partyColors[w[0]]||dfl,w[1]);p.style.opacity=1}});
    }else if(mode==='pres1'||mode==='pres2'){
      const res=(mode==='pres1')?presidentialResultsStore.round1:presidentialResultsStore.round2;
      if(!res||!res.length){paths.forEach(p=>p.style.fill=dfl);return}
      provinces.forEach(prov=>{let w={n:'',v:-1},tot=0;
        res.forEach(c=>{const v=c.presAbsoluteVotes[prov.id]||0;tot+=v;if(v>w.v)w={n:c.candidate,v}});
        if(w.n){const el=[...paths].find(x=>x.id===prov.id);if(el)el.style.fill=adjustColor(candidateColorMapping[w.n]||dfl,tot>0?(w.v/tot*100):0)}});
    }else{paths.forEach(p=>p.style.fill=dfl)}
  });
}

/* ── Calculations ── */
function calculateWrapper(){
  let ni={},ti=0;parties.forEach(p=>{const v=parseFloat(document.getElementById(`input_${p}`).value)||0;ni[p]=v;ti+=v});
  if(ti===0){resultsDiv.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px"><div style="font-size:14px;font-weight:700;color:var(--warn)">Veri Girişi Eksik</div><div style="font-size:11px;color:var(--muted-lt);margin-top:4px">Lütfen parti oranlarını giriniz</div></div>`;return}
  const pv={};provinces.forEach(p=>{pv[p.id]=p.defaultVotes||0});
  normalizedNationalVotes={};parties.forEach(p=>{normalizedNationalVotes[p]=ni[p]/ti});
  calculateParliamentary(pv);
  const{candidates:c1,isRunoff}=calculatePresidential(1,pv);presidentialResultsStore.round1=c1;
  presidentialResultsStore.round2=[];
  if(isRunoff){if(secondRoundDiv.classList.contains('hidden')){renderSecondRoundInputs(c1.sort((a,b)=>b.totalAbsoluteVotes-a.totalAbsoluteVotes).slice(0,2).map(c=>c.candidate))}presidentialResultsStore.round2=calculatePresidential(2,pv).candidates}else{secondRoundDiv.classList.add('hidden')}
  renderAllResults();updateMapColors();
}
function calculateParliamentary(pv){
  provinceResultsStore=[];
  provinces.forEach(prov=>{let cv={};parties.forEach(p=>{cv[p]=(normalizedNationalVotes[p]||0)*(prov.ratios[p]||0)});const sc=Object.values(cv).reduce((a,b)=>a+b,0);let lp={};parties.forEach(p=>{lp[p]=sc>0?(cv[p]/sc)*100:0});let av={};parties.forEach(p=>{av[p]=(lp[p]/100)*(pv[prov.id]||0)});let sa=Object.fromEntries(parties.map(p=>[p,0]));for(let i=0;i<prov.mpCount;i++){let mq=-1,wp=null;parties.forEach(p=>{if(p!=='OTH'&&(document.getElementById(`qualify_${p}`).checked||(normalizedNationalVotes[p]*100>=7))){const q=cv[p]/(sa[p]+1);if(q>mq){mq=q;wp=p}}});if(wp)sa[wp]++}provinceResultsStore.push({province:prov.id,localPercentages:lp,absoluteVotes:av,seatsAllocated:sa})});
}
function calculatePresidential(round,pv){
  const tid=round===1?'presidentialTable':'secondRoundTable',sid=round===1?'sandigaRow':'srSandigaRow';const tbl=document.getElementById(tid);if(!tbl)return{candidates:[],isRunoff:false};
  const rows=Array.from(tbl.tBodies[0].rows).filter(r=>r.id!==sid);
  let cands=rows.map(r=>{const cs=r.cells,nm=cs[0].querySelector('input').value.trim()||'Aday',sp=Array.from(cs).slice(1).map(c=>parseFloat(c.querySelector('input').value)||0);return{candidate:nm,support:Object.fromEntries(parties.map((p,i)=>[p,sp[i]])),totalRatioVote:0,presVoteRatios:{},totalAbsoluteVotes:0,presAbsoluteVotes:{}}});
  const sr=document.getElementById(sid),sv=Array.from(sr.cells).slice(1).map(c=>parseFloat(c.querySelector('input').value)||0),ss=Object.fromEntries(parties.map((p,i)=>[p,sv[i]]));
  cands.forEach((c,i)=>{if(!candidateColorMapping[c.candidate])candidateColorMapping[c.candidate]=candidateColorsArray[i%candidateColorsArray.length]});
  cands.forEach(c=>{c.totalRatioVote=0;parties.forEach(p=>{c.totalRatioVote+=(normalizedNationalVotes[p]||0)*(c.support[p]/100)*((100-ss[p])/100)})});
  cands.forEach(c=>{c.presVoteRatios={};provinces.forEach(prov=>{let sc=0;parties.forEach(p=>{sc+=(normalizedNationalVotes[p]||0)*(prov.ratios[p]||0)*(c.support[p]/100)*((100-ss[p])/100)});c.presVoteRatios[prov.id]=sc})});
  provinces.forEach(prov=>{const t=cands.reduce((s,c)=>s+(c.presVoteRatios[prov.id]||0),0);cands.forEach(c=>{c.presAbsoluteVotes[prov.id]=t>0?((c.presVoteRatios[prov.id]||0)/t)*(pv[prov.id]||0):0})});
  cands.forEach(c=>{c.totalAbsoluteVotes=Object.values(c.presAbsoluteVotes).reduce((a,b)=>a+b,0)});
  const ta=cands.reduce((s,c)=>s+c.totalAbsoluteVotes,0);
  return{candidates:cands,isRunoff:round===1&&ta>0&&!cands.some(c=>(c.totalAbsoluteVotes/ta*100)>50)};
}

/* ── Render results ── */
function renderAllResults(){
  let h='<div class="fade-in">';const ts=600,mp=(301/600)*100;
  const tap=Object.fromEntries(parties.map(p=>[p,0]));provinceResultsStore.forEach(pr=>{Object.entries(pr.absoluteVotes).forEach(([p,v])=>{tap[p]+=v})});
  const ta=Object.values(tap).reduce((a,b)=>a+b,0);
  const os=Object.fromEntries(parties.map(p=>[p,0]));provinceResultsStore.forEach(pr=>{Object.entries(pr.seatsAllocated).forEach(([p,s])=>{os[p]+=s})});
  const sorted=Object.keys(normalizedNationalVotes).map(p=>({p,pct:ta>0?(tap[p]/ta*100):0,s:os[p]})).sort((a,b)=>b.s-a.s||b.pct-a.pct).filter(d=>d.pct>0.1||d.s>0);
  // Hemicycle
  h+=`<div style="padding:14px 16px;border-bottom:1px solid var(--line)"><div class="hbar" style="position:relative">`;
  sorted.forEach(d=>{const w=(d.s/ts)*100;if(w>0)h+=`<div class="hseg" style="width:${w}%;background:${partyColors[d.p]}"></div>`});
  h+=`<div class="majline" style="left:${mp}%"></div></div><div class="pills">`;
  sorted.slice(0,6).forEach(d=>{if(d.s>0)h+=`<div class="pill"><div class="pill-dot" style="background:${partyColors[d.p]}"></div><span class="pill-name">${d.p}</span><span class="pill-val">${d.s}</span></div>`});
  h+=`</div><div style="margin-top:8px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted-lt);font-variant-numeric:tabular-nums">Toplam oy: ${Math.round(ta).toLocaleString('tr-TR')}</div></div>`;
  // Party rows
  sorted.forEach(d=>{
    const votes=Math.round(tap[d.p]||0).toLocaleString('tr-TR');
    h+=`<div class="rrow"><div class="rbar" style="width:${d.pct}%;background:${partyColors[d.p]}"></div>
      <div class="rinfo"><div class="rdot" style="background:${partyColors[d.p]}"></div>
        <div><div class="rname">${d.p}</div>
        <div style="display:flex;gap:8px;align-items:center"><div class="rpct">%${d.pct.toFixed(1)}</div><div style="font-family:var(--mono);font-size:9px;font-weight:500;color:var(--muted-lt);font-variant-numeric:tabular-nums">${votes}</div></div></div></div>
      <div style="text-align:right;z-index:1;position:relative"><div class="rseats">${d.s}</div><div style="font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-lt)">MV</div></div></div>`});
  // Presidential
  const rps=(title,res)=>{const t=res.reduce((s,c)=>s+c.totalAbsoluteVotes,0);let s=`<div style="padding:14px 16px;border-top:2px solid var(--line)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><div style="width:6px;height:6px;border-radius:50%;background:var(--warn)"></div><span class="slbl">${title}</span></div>`;
    res.sort((a,b)=>b.totalAbsoluteVotes-a.totalAbsoluteVotes).forEach(c=>{const pct=t>0?(c.totalAbsoluteVotes/t*100):0,col=candidateColorMapping[c.candidate]||'#94a3b8';
      s+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:14px;font-weight:800;color:var(--ink)">${c.candidate}</span>
        <span style="font-family:var(--mono);font-size:20px;font-weight:900;color:${col};font-variant-numeric:tabular-nums;letter-spacing:-.03em">${pct.toFixed(1)}%</span></div>
        <div style="height:8px;background:var(--line);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:4px;transition:width .5s cubic-bezier(.2,.8,.2,1)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono);font-variant-numeric:tabular-nums"><span>Toplam Oy</span><span>${Math.round(c.totalAbsoluteVotes).toLocaleString('tr-TR')}</span></div></div>`});return s+`</div>`};
  if(presidentialResultsStore.round1.length>0)h+=rps("CB 1. TUR",presidentialResultsStore.round1);
  if(presidentialResultsStore.round2.length>0)h+=rps("CB 2. TUR",presidentialResultsStore.round2);
  h+=`</div>`;resultsDiv.innerHTML=h;
}

/* ── Color ── */
function hexToHSL(H){let r=0,g=0,b=0;if(H.length==4){r="0x"+H[1]+H[1];g="0x"+H[2]+H[2];b="0x"+H[3]+H[3]}else if(H.length==7){r="0x"+H[1]+H[2];g="0x"+H[3]+H[4];b="0x"+H[5]+H[6]}r/=255;g/=255;b/=255;let mn=Math.min(r,g,b),mx=Math.max(r,g,b),d=mx-mn,h=0,s=0,l=0;if(d==0)h=0;else if(mx==r)h=((g-b)/d)%6;else if(mx==g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360;l=(mx+mn)/2;s=d==0?0:d/(1-Math.abs(2*l-1));return{h,s:+(s*100).toFixed(1),l:+(l*100).toFixed(1)}}
function hslToHex({h,s,l}){s/=100;l/=100;let c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2,r=0,g=0,b=0;if(0<=h&&h<60){r=c;g=x}else if(60<=h&&h<120){r=x;g=c}else if(120<=h&&h<180){g=c;b=x}else if(180<=h&&h<240){g=x;b=c}else if(240<=h&&h<300){r=x;b=c}else{r=c;b=x}r=Math.round((r+m)*255).toString(16);g=Math.round((g+m)*255).toString(16);b=Math.round((b+m)*255).toString(16);if(r.length==1)r="0"+r;if(g.length==1)g="0"+g;if(b.length==1)b="0"+b;return"#"+r+g+b}
function adjustColor(bc,vs){if(!bc)return'#cbd5e1';let hsl=hexToHSL(bc);const f=Math.min(1,vs/65);hsl.l=85-(f*50);hsl.s=40+(f*60);return hslToHex(hsl)}
</script>

      const nms=(s.pres1||[]).map(r=>r.name).filter(Boolean);if(typeof renderPresidentialInputs==="function")renderPresidentialInputs(nms.length?nms:undefined);
      parties.forEach(p=>{const i=document.getElementById(`input_${p}`);if(i&&s.national?.[p]!=null)i.value=s.national[p];const q=document.getElementById(`qualify_${p}`),b=document.getElementById(`qualify_${p}_btn`);if(q&&s.qualify?.[p]!=null){q.checked=!!s.qualify[p];if(b)b.classList.toggle('on',q.checked)}});
      const fct=(tid,data)=>{const t=document.getElementById(tid);if(!t?.tBodies?.[0]||!Array.isArray(data))return;const rows=Array.from(t.tBodies[0].rows).filter(r=>r.id!=="sandigaRow");data.forEach((d,i)=>{if(!rows[i])return;const ni=rows[i].querySelector('th input[type="text"]');if(ni&&d.name!=null)ni.value=d.name;Array.from(rows[i].querySelectorAll('td input[type="number"]')).forEach((inp,j)=>{if(d.votes?.[j]!=null)inp.value=d.votes[j]})})};
      fct("presidentialTable",s.pres1);const sd=document.getElementById("secondRoundDiv");
      if(sd){if(s.runoffVisible&&Array.isArray(s.pres2)&&s.pres2.length){if(typeof renderSecondRoundInputs==="function")renderSecondRoundInputs(s.pres2.map(r=>r.name));sd.classList.remove("hidden");fct("secondRoundTable",s.pres2)}else sd.classList.add("hidden")}
      pinnedProvinceId=s.pinnedProvinceId||null;if(typeof switchElectionMode==="function")switchElectionMode(s.electionMode||"parliamentary");
      if(Object.values(s.national||{}).some(v=>(parseFloat(v)||0)>0)&&typeof calculateWrapper==="function")calculateWrapper()}
    showToast("Durum yüklendi.","ok");return true}catch(e){console.warn(e);showToast("Yüklenemedi.","bad");return false}}
function loadState(){const r=localStorage.getItem(SK);if(!r)return;try{applyState(JSON.parse(r))}catch{}}
function updateProvinceInspector(prov,reason="hover"){
  if(!prov)return;if(pinnedProvinceId&&reason==="hover"&&prov.id!==pinnedProvinceId)return;
  const t=$("#provinceInspectorTitle"),b=$("#provinceInspectorBody"),h=$("#provinceInspectorHint");
  const def=$("#inspectorDefault"),act=$("#inspectorActive");
  if(!t||!b||!def||!act)return;
  def.style.display='none';act.style.display='flex';
  t.textContent=prov.displayName||prov.id;if(h)h.textContent=pinnedProvinceId===prov.id?`SABİT · MV: ${prov.mpCount}`:`MV: ${prov.mpCount}`;
  const pr=typeof provinceResultsStore!=="undefined"?provinceResultsStore.find(r=>r.province===prov.id):null;
  if(!pr){b.innerHTML=`<span style="font-size:11px;color:var(--muted)">Hesapla butonuna basın</span>`;return}
  b.innerHTML=Object.entries(pr.localPercentages||{}).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([p,pct])=>{const s=(pr.seatsAllocated||{})[p]||0,c=partyColors?.[p]||"#94a3b8";return`<div class="pinsp-chip"><div class="pcd" style="background:${c}"></div><span class="pcn">${p}</span><span class="pcv">${pct.toFixed(1)}%</span>${s?`<span class="pcs">${s}</span>`:''}</div>`}).join('')}
function clearProvinceInspector(){
  const def=$("#inspectorDefault"),act=$("#inspectorActive");
  if(def)def.style.display='flex';if(act)act.style.display='none';
}
function setPinnedProvince(id){pinnedProvinceId=id;scheduleSave();$$('.map-panel path').forEach(p=>{p.style.strokeWidth=".7";p.style.stroke="var(--map-stroke)"});if(id){$$('.map-panel path').filter(el=>el.id===id).forEach(el=>{el.style.stroke="var(--blue)";el.style.strokeWidth="2.5"})}}
function focusProvince(id){const els=$$('.map-panel path').filter(el=>el.id===id);els.forEach(el=>{el.style.filter="drop-shadow(0 0 10px rgba(37,99,235,.4))";setTimeout(()=>{el.style.filter=""},900)})}
function wireMapA11yAndClicks(){
  // Wire toggle/inspector via global functions called from rebuildMaps
  window.togglePin=function(prov){
    if(!prov)return;const n=pinnedProvinceId===prov.id?null:prov.id;setPinnedProvince(n);updateProvinceInspector(prov,"pin");showToast(n?`${prov.displayName} sabitlendi.`:"Bırakıldı.",n?"ok":"info");
  };
  window.updatePI=function(prov){if(prov){lastHoverProvinceId=prov.id;updateProvinceInspector(prov,"hover")}};
}function wireProvinceSearch(){const inp=$("#provinceSearch"),clr=$("#btnClearSearch");if(!inp)return;inp.addEventListener("input",debounce(()=>{const q=inp.value.trim().toLowerCase();if(!q)return;const p=provinces?.find(x=>(x.displayName||"").toLowerCase().includes(q));if(p){focusProvince(p.id);updateProvinceInspector(p,"hover")}},180));if(clr)clr.addEventListener("click",()=>{inp.value="";inp.focus()})}
function wireIO(){
  const modal=$("#ioModal"),btn=$("#btnIO"),close=$("#btnCloseIO"),txt=$("#ioText"),bc=$("#btnCopyJSON"),ba=$("#btnApplyJSON"),bd=$("#btnDownloadJSON"),bs=$("#btnShareLink"),fi=$("#fileImport");
  const open=()=>{if(!modal||!txt)return;txt.value=JSON.stringify(snapshotState(true),null,2);modal.classList.remove("hidden");txt.focus()};
  const shut=()=>modal?.classList.add("hidden");
  btn?.addEventListener("click",open);close?.addEventListener("click",shut);
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){[modal,document.getElementById('presModal'),document.getElementById('createPartyModal')].forEach(m=>{if(m&&!m.classList.contains('hidden'))m.classList.add('hidden')})}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="s"){e.preventDefault();open()}});
  bc?.addEventListener("click",async()=>{try{await navigator.clipboard.writeText(txt.value||"");showToast("Kopyalandı.","ok")}catch{showToast("Başarısız.","warn")}});
  ba?.addEventListener("click",()=>{try{if(applyState(JSON.parse(txt.value))){saveState();shut()}}catch{showToast("Geçersiz JSON.","bad")}});
  bd?.addEventListener("click",()=>{const b=new Blob([txt.value||""],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`secim-${Date.now()}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);showToast("İndirildi.","ok")});
  bs?.addEventListener("click",async()=>{const m=snapshotState(false);const pl=btoa(unescape(encodeURIComponent(JSON.stringify({v:m.v,electionMode:m.electionMode,parties:m.parties,partyColors:m.partyColors,national:m.national,qualify:m.qualify,pres1:m.pres1,pres2:m.pres2,runoffVisible:m.runoffVisible,theme:m.theme}))));try{await navigator.clipboard.writeText(`${location.origin}${location.pathname}#s=${pl}`);showToast("Link kopyalandı.","ok")}catch{showToast("Başarısız.","warn")}});
  fi?.addEventListener("change",async e=>{const f=e.target.files?.[0];if(!f)return;txt.value=await f.text();showToast("Yüklendi. Uygula ile aktarın.","ok")})}
function wireReset(){$("#btnReset")?.addEventListener("click",()=>{localStorage.removeItem(SK);showToast("Sıfırlandı.","warn");setTimeout(()=>location.reload(),350)})}
function wireTheme(){$("#btnTheme")?.addEventListener("click",()=>{const n=getTheme()==="midnight"?"aurora":"midnight";applyTheme(n);scheduleSave();showToast(`Tema: ${n.toUpperCase()}`,"ok")})}
function wirePinButtons(){
  $("#btnPinProvince")?.addEventListener("click",()=>{const id=pinnedProvinceId||lastHoverProvinceId;if(!id)return showToast("Önce il seçin.","warn");setPinnedProvince(id);const p=provinces?.find(x=>x.id===id);if(p)updateProvinceInspector(p,"pin")});
  $("#btnUnpinProvince")?.addEventListener("click",()=>{setPinnedProvince(null);clearProvinceInspector();showToast("Bırakıldı.","info")})}
function wireAutosaveOnInput(){
  const handler=e=>{const t=e.target;if(!t)return;if((t.id&&(t.id.startsWith("input_")||t.id.startsWith("qualify_")))||t.closest?.("#presidentialTable")||t.closest?.("#secondRoundTable")||t.closest?.("#createPartyModal")){scheduleSave();scheduleRun()}};
  document.addEventListener("input",handler,{passive:true});document.addEventListener("change",handler,{passive:true});
  if(typeof switchElectionMode==="function"&&!switchElectionMode.__enhanced){const _s=switchElectionMode;switchElectionMode=m=>{_s(m);scheduleSave()};switchElectionMode.__enhanced=true}
  if(typeof submitNewParty==="function"&&!submitNewParty.__enhanced){const _p=submitNewParty;submitNewParty=()=>{_p();scheduleSave();scheduleRun()};submitNewParty.__enhanced=true}}
function parseHashState(){const h=location.hash||"",m=h.match(/#s=([^&]+)/);if(!m)return null;try{return JSON.parse(decodeURIComponent(escape(atob(m[1]))))}catch{return null}}
document.addEventListener("DOMContentLoaded",()=>{
  applyTheme(getTheme());setAutoRun(localStorage.getItem(SA)==="1");
  wireTheme();wireIO();wireReset();wirePinButtons();wireProvinceSearch();wireAutosaveOnInput();wireMapA11yAndClicks();
  const fh=parseHashState();if(fh){applyState(Object.assign({v:3,autoRun,pinnedProvinceId:null},fh));showToast("Link uygulandı.","ok")}else loadState();scheduleSave()})
})();
</script>
</body></html>
