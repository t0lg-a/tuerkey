<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ara Seçim Simülatörü</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f3f4f6;color:#111827;-webkit-font-smoothing:antialiased;padding:10px}
.wrap{max-width:960px;margin:0 auto}
.card{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,.6);box-shadow:0 4px 6px -1px rgba(0,0,0,.05);margin-bottom:12px;overflow:hidden}
.card-head{padding:10px 14px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.card-head:active{background:rgba(0,0,0,.02)}
.card-title{font-weight:700;font-size:13px}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:ui-monospace,monospace;background:#dbeafe;color:#1e40af}
.arrow{font-size:11px;color:#9ca3af;transition:transform .2s}
.card-body{padding:10px 14px}
.card-body.closed{display:none}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.tn{font-variant-numeric:tabular-nums}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;white-space:nowrap}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.dot{border-radius:50%;display:inline-block;flex-shrink:0}
.btn{padding:5px 12px;border-radius:9999px;border:none;font-weight:600;font-size:11px;cursor:pointer;font-family:inherit}
.ni{font-family:ui-monospace,monospace;font-size:13px;font-weight:600;width:48px;padding:5px 4px;border:1px solid #d1d5db;border-radius:8px;text-align:center;outline:none;background:#fff}
.si{font-family:ui-monospace,monospace;font-size:11px;font-weight:600;width:34px;padding:3px 2px;border:1px solid #e5e7eb;border-radius:6px;text-align:center;outline:none;background:#fff}
.si:focus,.ni:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.vote-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.vote-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:46px}
.vote-label{display:flex;align-items:center;gap:3px}
.matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.matrix-wrap table{border-collapse:collapse;min-width:460px}
.matrix-wrap th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;padding:5px 3px;text-align:center}
.matrix-wrap td{padding:2px 1px;text-align:center;font-size:11px;font-family:ui-monospace,monospace;font-weight:600;border-bottom:1px solid #f3f4f6}
.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px}
.region-item{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:8px}
.region-item.active{background:#dbeafe}
.region-item label{font-size:11px;flex:1;cursor:pointer}
.region-item label.active{font-weight:700;color:#1e40af}
.region-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#2563eb}
.seat-in{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;width:28px;padding:2px;border:1px solid #d1d5db;border-radius:6px;text-align:center;background:#fff}
.agg-bar{display:flex;height:30px;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}
.agg-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:width .3s cubic-bezier(.2,.8,.2,1)}
.agg-pills{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.map-wrap{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;background:#fafafa;position:relative}
.map-wrap svg{width:100%;display:block;touch-action:manipulation}
.map-wrap path{cursor:pointer;transition:fill .15s}
.tooltip{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-radius:12px;padding:8px 10px;box-shadow:0 4px 12px rgba(0,0,0,.12);font-size:11px;min-width:130;pointer-events:none;z-index:10;border:1px solid rgba(0,0,0,.06);display:none}
.sort-row{display:flex;gap:4px;margin-bottom:6px;align-items:center}
.res-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.res-wrap table{border-collapse:collapse;width:100%;min-width:560px}
.res-wrap th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;padding:5px 3px;text-align:center;position:sticky;top:0;background:#fff;z-index:1}
.res-wrap td{padding:3px 2px;text-align:center;font-size:11px;font-family:ui-monospace,monospace;font-weight:600;border-bottom:1px solid #f3f4f6}
.res-wrap td.prov{text-align:left;font-family:'Inter',sans-serif;font-weight:700}
.won{font-weight:800}
.seat-badge{font-size:8px;font-weight:900;border-radius:3px;padding:0 3px;margin-top:1px;display:inline-block}
.header{text-align:center;margin-bottom:12px}
.header h1{font-size:17px;font-weight:800;letter-spacing:-.02em}
.header p{font-size:11px;color:#6b7280;margin-top:2px}
.status{display:flex;justify-content:center;gap:6px;margin-top:6px;flex-wrap:wrap}
@media(max-width:480px){
  .ni{width:42px;font-size:12px;padding:6px 3px}
  .vote-grid{gap:6px}
  .vote-item{min-width:42px}
  .region-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Ara Seçim Simülatörü</h1>
    <p>Turkey By-Election Simulator</p>
    <div class="status" id="statusBar"></div>
  </div>

  <div class="card" id="cardVote">
    <div class="card-head" data-toggle="vote"><span class="card-title">National Vote <span class="badge" id="voteBadge">100%</span></span><span class="arrow">▼</span></div>
    <div class="card-body" id="bodyVote">
      <div class="vote-grid" id="voteGrid"></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:6px;justify-content:center">
        <span class="lbl">Threshold %</span>
        <input type="number" class="ni" style="width:40px" id="thresholdInput" value="7" min="0" max="20" step="1" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="card" id="cardMatrix">
    <div class="card-head" data-toggle="matrix"><span class="card-title">Support Matrix <span class="badge">transfer %</span></span><span class="arrow" style="transform:rotate(0)">▼</span></div>
    <div class="card-body closed" id="bodyMatrix">
      <p style="font-size:10px;color:#6b7280;margin-bottom:6px">Row = source, Col = destination. Diagonal = loyal. Remainder = abstain.</p>
      <div class="matrix-wrap" id="matrixWrap"></div>
    </div>
  </div>

  <div class="card" id="cardRegions">
    <div class="card-head" data-toggle="regions"><span class="card-title">Regions <span class="badge" id="regionBadge">29 il</span></span><span class="arrow" style="transform:rotate(0)">▼</span></div>
    <div class="card-body closed" id="bodyRegions">
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap" id="regionButtons"></div>
      <div class="region-grid" id="regionGrid"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-title">Results <span class="badge" id="resultBadge">30 seats</span></span></div>
    <div class="card-body">
      <div style="margin-bottom:10px">
        <div class="agg-bar" id="aggBar"></div>
        <div class="agg-pills" id="aggPills"></div>
      </div>
      <div class="map-wrap">
        <svg viewBox="0 0 960 340" preserveAspectRatio="xMidYMid meet" id="mapSvg"></svg>
        <div class="tooltip" id="mapTip"></div>
      </div>
      <div class="sort-row">
        <span class="lbl">Sort:</span>
        <button class="btn" data-sort="name" style="background:#111827;color:#fff;font-size:10px;padding:3px 8px">Province</button>
        <button class="btn" data-sort="chp" style="background:#e5e7eb;color:#374151;font-size:10px;padding:3px 8px">CHP %</button>
        <button class="btn" data-sort="seats" style="background:#e5e7eb;color:#374151;font-size:10px;padding:3px 8px">Seats</button>
      </div>
      <div class="res-wrap" id="resWrap"></div>
    </div>
  </div>
</div>

/* ── Compute ── */
function dhondt(v,n){const r={};Object.keys(v).forEach(p=>r[p]=0);for(let s=0;s<n;s++){let b=-1,w=null;for(const p of Object.keys(v)){const q=v[p]/(r[p]+1);if(q>b){b=q;w=p}}if(w)r[w]++}return r}

function compute(){
  const res=[];const ag={};PT.forEach(p=>ag[p]=0);
  const nt=Object.values(S.nat).reduce((a,b)=>a+b,0);
  for(const[id,ns]of Object.entries(S.sel)){
    const pv=PM[id];if(!pv)continue;
    const raw={};PT.forEach((p,i)=>{raw[p]=(S.nat[p]||0)*(pv.ratios[i]||0)});
    const eff={};PT.forEach(d=>{eff[d]=0;PT.forEach(s=>{eff[d]+=(raw[s]||0)*((S.mat[s]?.[d]||0)/100)})});
    const tot=Object.values(eff).reduce((a,b)=>a+b,0);
    const lp={};PT.forEach(p=>{lp[p]=tot>0?(eff[p]/tot)*100:0});
    const qv={};PT.forEach(p=>{const np=nt>0?(S.nat[p]/nt)*100:0;qv[p]=np>=S.th?lp[p]:0});
    const seats=dhondt(qv,ns);
    res.push({id,name:pv.name,bs:pv.bs,ns,lp,seats});
    PT.forEach(p=>{ag[p]+=(seats[p]||0)});
  }
  if(S.sort==="chp")res.sort((a,b)=>(b.lp.CHP||0)-(a.lp.CHP||0));
  else if(S.sort==="seats")res.sort((a,b)=>b.ns-a.ns);
  else res.sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  return{res,ag};
}

/* ── Render ── */
function dot(p,sz){return `<span class="dot" style="width:${sz}px;height:${sz}px;background:${PC[p]}"></span>`}

function renderAll(){
  const nt=Object.values(S.nat).reduce((a,b)=>a+b,0);
  const ts=Object.values(S.sel).reduce((a,b)=>a+b,0);
  const{res,ag}=compute();

  // Status
  document.getElementById("statusBar").innerHTML=
    `<span class="pill mono tn" style="background:${ts>=30?"#dcfce7":"#fef3c7"};color:${ts>=30?"#166534":"#92400e"}">${ts} seats ${ts>=30?"≥5% ✓":`(${30-ts} to 5%)`}</span>`+
    `<span class="pill mono tn" style="background:${Math.abs(nt-100)<.5?"#dbeafe":"#fee2e2"};color:${Math.abs(nt-100)<.5?"#1e40af":"#991b1b"}">Σ ${nt.toFixed(1)}%</span>`;
  document.getElementById("voteBadge").textContent=nt.toFixed(0)+"%";
  document.getElementById("regionBadge").textContent=Object.keys(S.sel).length+" il";
  document.getElementById("resultBadge").textContent=ts+" seats";

  // Aggregate bar
  let barH="";PT.filter(p=>ag[p]>0).forEach(p=>{
    const w=(ag[p]/Math.max(ts,1))*100;
    barH+=`<div class="agg-seg mono tn" style="width:${w}%;background:${PC[p]};color:${PCt[p]};min-width:${w>3?20:0}px">${ag[p]>0?ag[p]:""}</div>`;
  });
  document.getElementById("aggBar").innerHTML=barH;

  let pillH="";PT.filter(p=>ag[p]>0).forEach(p=>{
    const c=PC[p]==="#FFC72C"?"#92400e":PC[p];
    pillH+=`<span class="pill mono tn" style="font-size:10px;background:${PC[p]}18;color:${c}">${dot(p,6)} ${PLBL[p]} <b>${ag[p]}</b></span>`;
  });
  document.getElementById("aggPills").innerHTML=pillH;

  // Map
  PATHS.forEach(pp=>{
    const el=document.getElementById("mp_"+pp.id);
    if(!el)return;
    const sel=S.sel[pp.id];
    let fill="#e5e7eb";
    if(sel){
      const r=res.find(x=>x.id===pp.id);
      if(r){let mx=0,w=null;PT.forEach(p=>{if((r.seats[p]||0)>mx){mx=r.seats[p];w=p}});if(w)fill=PC[w];else fill="#d1d5db"}
    }
    el.setAttribute("fill",fill);
    el.setAttribute("stroke",sel?"rgba(255,255,255,.85)":"rgba(0,0,0,.18)");
    el.setAttribute("stroke-width",sel?"1.2":".5");
  });
  // Seat labels
  document.querySelectorAll(".map-slbl").forEach(e=>e.remove());
  const svg=document.getElementById("mapSvg");
  PATHS.filter(p=>S.sel[p.id]&&S.sel[p.id]>1).forEach(p=>{
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",p.c[0]);t.setAttribute("y",p.c[1]);
    t.setAttribute("text-anchor","middle");t.setAttribute("dominant-baseline","central");
    t.setAttribute("fill","#fff");t.setAttribute("class","map-slbl");
    t.style.cssText="font-size:10px;font-weight:900;font-family:ui-monospace,monospace;pointer-events:none;text-shadow:0 0 4px rgba(0,0,0,.7)";
    t.textContent=S.sel[p.id];
    svg.appendChild(t);
  });

  // Results table
  let tH=`<table><thead><tr><th style="text-align:left;min-width:72px">Province</th><th>N</th>`;
  PT.forEach(p=>{tH+=`<th>${dot(p,4)}<br>${PLBL[p]}</th>`});
  tH+=`</tr></thead><tbody>`;
  res.forEach(r=>{
    tH+=`<tr><td class="prov" style="font-size:11px">${r.name}${r.bs?'<span style="font-size:7px;color:#9ca3af;margin-left:2px">BŞ</span>':''}</td><td style="font-weight:800">${r.ns}</td>`;
    PT.forEach(p=>{
      const pct=r.lp[p]||0;const won=(r.seats[p]||0)>0;const sc=r.seats[p]||0;
      const bg=won?PC[p]+"20":"transparent";
      const col=won?(PC[p]==="#FFC72C"?"#92400e":PC[p]):"#9ca3af";
      tH+=`<td style="background:${bg};color:${col};font-weight:${won?800:500}">${pct.toFixed(1)}${won?`<div class="seat-badge" style="background:${PC[p]};color:${PCt[p]}">${sc>1?"×"+sc:"✓"}</div>`:""}</td>`;
    });
    tH+=`</tr>`;
  });
  tH+=`</tbody></table>`;
  document.getElementById("resWrap").innerHTML=tH;

  // Region checkboxes
  renderRegions();
}

function renderRegions(){
  const grid=document.getElementById("regionGrid");
  const sorted=[...PROVS].sort((a,b)=>a.name.localeCompare(b.name,"tr"));

    </div>`;
  });
  grid.innerHTML=h;
}

  // Matrix
  let mH=`<table><thead><tr><th style="text-align:left;min-width:36px">From</th>`;
  PT.forEach(d=>{mH+=`<th>${dot(d,5)}<br>${PLBL[d]}</th>`});
  mH+=`<th>Σ</th></tr></thead><tbody>`;
  PT.forEach(s=>{
    mH+=`<tr><td style="text-align:left;font-weight:700;font-size:10px"><span style="display:inline-flex;align-items:center;gap:3px">${dot(s,5)} ${PLBL[s]}</span></td>`;
    PT.forEach(d=>{
      const v=S.mat[s][d];
      const bg=s===d?PC[s]+"18":(v>0&&s!==d)?"#fef3c7":"#fff";
      mH+=`<td style="padding:1px"><input type="number" class="si" value="${v}" step="5" min="0" max="100" inputmode="numeric" data-ms="${s}" data-md="${d}" style="background:${bg};font-weight:${s===d?800:600}"></td>`;
    });
    const rs=PT.reduce((a,d)=>a+S.mat[s][d],0);
    const rc=rs>100?"#dc2626":rs<100?"#f59e0b":"#10b981";
    mH+=`<td class="mono tn" style="color:${rc};font-weight:800;font-size:10px" data-msum="${s}">${rs}</td></tr>`;
  });
  mH+=`</tbody></table>`;
  document.getElementById("matrixWrap").innerHTML=mH;

  // Map SVG
  const svg=document.getElementById("mapSvg");
  PATHS.forEach(p=>{
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.id="mp_"+p.id;path.setAttribute("d",p.d);
    path.setAttribute("stroke-linejoin","round");
    path.style.cursor="pointer";path.style.transition="fill .15s";
    path.addEventListener("pointerdown",()=>{if(S.sel[p.id])delete S.sel[p.id];else S.sel[p.id]=1;renderAll()});
    path.addEventListener("mouseenter",()=>{
      path.setAttribute("stroke","#111827");path.setAttribute("stroke-width","2.5");
      showTip(p.id);
    });
    path.addEventListener("mouseleave",()=>{renderAll();hideTip()});
    svg.appendChild(path);
  });

  // Region buttons
  document.getElementById("regionButtons").innerHTML=
    `<button class="btn" style="background:#2563eb;color:#fff" data-ra="default">Default (30)</button>`+
    `<button class="btn" style="background:#e5e7eb;color:#374151" data-ra="clear">Clear</button>`+
    `<button class="btn" style="background:#e5e7eb;color:#374151" data-ra="bs">+ Büyükşehir</button>`+
    `<button class="btn" style="background:#e5e7eb;color:#374151" data-ra="all">All 81</button>`;

  renderAll();
}

/* ── Tooltip ── */
function showTip(id){
  const pv=PM[id];if(!pv)return;
  const tip=document.getElementById("mapTip");
  const{res}=compute();
  const r=res.find(x=>x.id===id);
  let h=`<div style="font-weight:700;font-size:12px;margin-bottom:3px">${pv.name}${pv.bs?' <span style="font-size:8px;color:#6b7280">BŞ</span>':''}</div>`;
  if(S.sel[id]&&r){
    h+=`<div style="font-size:9px;color:#6b7280;font-weight:600">Seats: ${S.sel[id]}</div>`;
    PT.filter(p=>(r.lp[p]||0)>1).forEach(p=>{
      const c=PC[p]==="#FFC72C"?"#92400e":PC[p];
      h+=`<div style="display:flex;align-items:center;gap:3px">${dot(p,5)}<span class="mono" style="font-size:9px;flex:1">${PLBL[p]}</span><span class="mono" style="font-weight:700;font-size:9px;color:${c}">${r.lp[p].toFixed(1)}%</span>`;
      if((r.seats[p]||0)>0)h+=`<span style="background:${PC[p]};color:${PCt[p]};font-size:7px;font-weight:900;padding:0 3px;border-radius:3px" class="mono">${r.seats[p]}</span>`;
      h+=`</div>`;
    });
  }else{h+=`<div style="font-size:9px;color:#9ca3af">Tap to add</div>`}
  tip.innerHTML=h;tip.style.display="block";
}
function hideTip(){document.getElementById("mapTip").style.display="none"}

/* ── Events ── */
document.addEventListener("input",e=>{
  const t=e.target;
  if(t.dataset.party){S.nat[t.dataset.party]=parseFloat(t.value)||0;renderAll()}
  if(t.dataset.ms&&t.dataset.md){S.mat[t.dataset.ms][t.dataset.md]=Math.max(0,Math.min(100,parseFloat(t.value)||0));
    const rs=PT.reduce((a,d)=>a+S.mat[t.dataset.ms][d],0);
    const el=document.querySelector(`[data-msum="${t.dataset.ms}"]`);
    if(el){el.textContent=rs;el.style.color=rs>100?"#dc2626":rs<100?"#f59e0b":"#10b981"}
    renderAll();
  }
  if(t.id==="thresholdInput"){S.th=parseFloat(t.value)||0;renderAll()}
  if(t.dataset.sid){S.sel[t.dataset.sid]=Math.max(1,Math.min(10,parseInt(t.value)||1));renderAll()}
});

document.addEventListener("change",e=>{
  if(e.target.dataset.rid){
    const id=e.target.dataset.rid;
    if(e.target.checked)S.sel[id]=1;else delete S.sel[id];
    renderAll();
  }
});

document.addEventListener("click",e=>{
  // Collapsible sections
  const tog=e.target.closest("[data-toggle]");
  if(tog){
    const key=tog.dataset.toggle;
    const map={vote:"bodyVote",matrix:"bodyMatrix",regions:"bodyRegions"};
    const body=document.getElementById(map[key]);
    if(body){body.classList.toggle("closed");
      const arrow=tog.querySelector(".arrow");
      if(arrow)arrow.style.transform=body.classList.contains("closed")?"rotate(0)":"rotate(180deg)";
    }
  }
  // Sort buttons
  const sortBtn=e.target.closest("[data-sort]");
  if(sortBtn){
    S.sort=sortBtn.dataset.sort;
    document.querySelectorAll("[data-sort]").forEach(b=>{b.style.background="#e5e7eb";b.style.color="#374151"});
    sortBtn.style.background="#111827";sortBtn.style.color="#fff";
    renderAll();
  }
  // Region action buttons
  const ra=e.target.closest("[data-ra]");
  if(ra){
    const a=ra.dataset.ra;
    if(a==="clear")S.sel={};
    if(a==="default")S.sel={TR34:2,TR41:1,TR31:1,TR02:1,TR03:1,TR37:1,TR71:1,TR35:1,TR48:1,TR59:1,TR09:1,TR26:1,TR07:1,TR20:1,TR10:1,TR33:1,TR06:1,TR45:1,TR01:1,TR16:1,TR52:1,TR44:1,TR27:1,TR55:1,TR61:1,TR38:1,TR46:1,TR54:1,TR42:1};
    if(a==="bs")PROVS.filter(p=>p.bs).forEach(p=>{if(!S.sel[p.id])S.sel[p.id]=1});
    if(a==="all")PROVS.forEach(p=>{if(!S.sel[p.id])S.sel[p.id]=1});
    renderAll();
  }
});

init();
</script>
</body>
</html>
